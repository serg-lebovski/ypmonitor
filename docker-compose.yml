# YPMonitor — сервер в Docker, подключается к внешнему PostgreSQL.
#
# Перед запуском создайте файл .env (рядом с этим файлом) на основе .env.example
# и впишите строку подключения к вашему PostgreSQL. Файл .env в git не попадает.
#
# Запуск:   docker compose up -d --build
# Логи:     docker compose logs -f
# Обновить: git pull && docker compose up -d --build

services:
  ypmon-server:
    build: .
    image: ypmonitor-server:latest
    container_name: ypmon-server
    restart: unless-stopped
    ports:
      - "${YPMON_HTTP_PORT:-8080}:8080"
    environment:
      Server__HttpPort: "8080"
      Database__Provider: "postgres"
      Database__ConnectionString: "${YPMON_DB_CONNSTRING}"
    volumes:
      - ypmon-updates:/app/agent-updates   # сюда кладите Ypmon.Agent.exe для автообновления агентов
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/api/ping"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    # Если PostgreSQL слушает на самом хосте (а не на отдельной машине),
    # раскомментируйте, чтобы из контейнера был доступен localhost хоста:
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"

volumes:
  ypmon-updates:
