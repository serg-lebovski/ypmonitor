# YPMonitor — сервер + PostgreSQL в Docker (всё в контейнерах).
#
# Перед запуском создайте .env на основе .env.example и задайте POSTGRES_PASSWORD.
# Файл .env в git не попадает.
#
# Запуск:   docker compose up -d --build
# Логи:     docker compose logs -f
# Обновить: git pull && docker compose up -d --build

services:
  postgres:
    image: postgres:16
    container_name: ypmon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin_yp
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: ypmon
    volumes:
      - ypmon-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin_yp -d ypmon"]
      interval: 10s
      timeout: 5s
      retries: 10
    # Порт наружу не публикуем — БД доступна только серверу по внутренней сети compose.

  ypmon-server:
    build: .
    image: ypmonitor-server:latest
    container_name: ypmon-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${YPMON_HTTP_PORT:-8080}:8080"
    environment:
      Server__HttpPort: "8080"
      Database__Provider: "postgres"
      Database__ConnectionString: "Host=postgres;Port=5432;Database=ypmon;Username=admin_yp;Password=${POSTGRES_PASSWORD}"
    volumes:
      - ypmon-updates:/app/agent-updates   # сюда кладите Ypmon.Agent.exe для автообновления агентов
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/api/ping"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  ypmon-pgdata:
  ypmon-updates:
